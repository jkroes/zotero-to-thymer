name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: '.node-version'
          run-install: |
            - args: ['--frozen-lockfile']
      - run: vp run verify
      - run: vp run build
      - run: vp run create-xpi
      - id: publish-xpi
        name: Publish xpi
        uses: softprops/action-gh-release@v3
        with:
          files: xpi/*.xpi
          make_latest: 'true'
      - name: Generate update manifest
        run: vp run generate-update-manifest ${{ fromJSON(steps.publish-xpi.outputs.assets)[0].browser_download_url }}
      - name: Publish update manifest
        uses: softprops/action-gh-release@v3
        with:
          tag_name: release
          files: gen/update*
          make_latest: 'false'
